<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的刀盾 - 搖桿控制戰士砍真人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'PingFang TC', monospace;
            touch-action: none;
        }

        /* 相機全螢幕背景 */
        #camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        /* 遊戲繪圖層 */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* UI 面板 */
        .ui-panel {
            position: fixed;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 8px 18px;
            color: white;
            font-weight: bold;
            border: 2px solid #ffd966;
            font-family: monospace;
        }

        .health-bar-container {
            top: 20px;
            left: 20px;
            width: 200px;
        }

        .enemy-health {
            top: 20px;
            right: 20px;
            width: 200px;
            text-align: right;
        }

        .health-label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .health-bg {
            background: #330000;
            border-radius: 20px;
            height: 18px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .enemy-health .health-fill {
            background: linear-gradient(90deg, #ff8844, #ff4400);
        }

        .status-panel {
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
            font-size: 13px;
        }

        .combo-panel {
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            color: #ffaa44;
            background: rgba(0,0,0,0.6);
            border-color: #ffaa44;
            white-space: nowrap;
        }

        /* 搖桿 */
        .joystick-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 20;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(30,30,50,0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .joystick-thumb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: rgba(255,215,0,0.9);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            pointer-events: none;
        }

        /* 攻擊防禦按鈕 */
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.05s linear;
        }

        .attack-btn {
            border-color: #ff4444;
            background: rgba(180,0,0,0.8);
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }

        .defend-btn {
            border-color: #44aaff;
            background: rgba(0,80,120,0.8);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .warning {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            font-size: 30px;
            font-weight: bold;
            color: #ff0000;
            background: rgba(0,0,0,0.95);
            padding: 18px 36px;
            border-radius: 60px;
            border: 3px solid red;
            animation: pulseWarning 0.3s infinite;
            display: none;
            white-space: nowrap;
            font-family: monospace;
        }

        @keyframes pulseWarning {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
        }

        .damage-pop {
            position: fixed;
            font-size: 36px;
            font-weight: bold;
            color: #ff6600;
            text-shadow: 0 0 10px red;
            z-index: 15;
            pointer-events: none;
            animation: floatUp 0.5s ease-out forwards;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e, #000000);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        .start-title {
            font-size: 56px;
            color: #ffd966;
            text-shadow: 0 0 25px rgba(255,217,102,0.6);
            font-family: monospace;
            letter-spacing: 4px;
        }

        .start-sub {
            font-size: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 14px 28px;
            border-radius: 60px;
            border: 2px solid #ffd966;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 52px;
            color: white;
            gap: 30px;
            backdrop-filter: blur(8px);
        }

        .game-over button {
            padding: 16px 44px;
            font-size: 24px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }

        .instruction {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel health-bar-container">
        <div class="health-label">❤️ 你的血量</div>
        <div class="health-bg"><div class="health-fill" id="playerHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel enemy-health">
        <div class="health-label">👹 真人敵人血量</div>
        <div class="health-bg"><div class="health-fill" id="enemyHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel combo-panel" id="comboDisplay">
        ⚔️ 連擊 0 ⚔️
    </div>

    <div class="status-panel ui-panel" id="statusText">
        🎮 左下搖桿移動戰士 | 靠近真人再攻擊
    </div>

    <div class="joystick-container">
        <div class="joystick-base" id="joystickBase"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>

    <div class="action-buttons">
        <div class="action-btn attack-btn" id="attackBtn">⚔️</div>
        <div class="action-btn defend-btn" id="defendBtn">🛡️</div>
    </div>

    <div id="warning" class="warning">⚠️ 轉頭防禦！ ⚠️</div>

    <div class="instruction">
        📍 左下搖桿移動刀盾戰士 | 走到真人旁邊按攻擊 | 轉頭按防禦
    </div>

    <div class="start-overlay" id="startOverlay">
        <div class="start-title">🗡️ 我的刀盾 🛡️</div>
        <div class="start-sub">⚔️ 點擊開啟鏡頭，控制戰士砍真人 ⚔️</div>
        <div style="color:#aaa; margin-top:20px; font-size:14px;">📷 需要允許相機權限</div>
    </div>

    <script>
        // ========== DOM 元素 ==========
        const video = document.getElementById('camera');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerHealthFill = document.getElementById('playerHealthFill');
        const enemyHealthFill = document.getElementById('enemyHealthFill');
        const statusDiv = document.getElementById('statusText');
        const warningDiv = document.getElementById('warning');
        const comboDisplay = document.getElementById('comboDisplay');
        const attackBtn = document.getElementById('attackBtn');
        const defendBtn = document.getElementById('defendBtn');
        const startOverlay = document.getElementById('startOverlay');
        const joystickBase = document.getElementById('joystickBase');
        const joystickThumb = document.getElementById('joystickThumb');

        // ========== 搖桿變數 ==========
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        let joystickCenter = { x: 0, y: 0 };
        let joystickRadius = 55;

        // ========== 刀盾戰士位置 (螢幕座標百分比) ==========
        let warriorX = 0.5;
        let warriorY = 0.6;
        const MOVE_SPEED = 0.009;

        // ========== 遊戲狀態 ==========
        let playerHealth = 100;
        let enemyHealth = 100;
        let gameRunning = true;
        let cameraReady = false;
        
        // 人臉/身體偵測
        let faceDetected = false;
        let isLookingAway = false;
        
        // 防禦系統
        let isDefending = false;
        let forcedDefense = false;
        let defendTimer = null;
        
        // 攻擊系統
        let canAttack = true;
        let attackCooldown = 0;
        let combo = 0;
        let comboTimeout = null;
        
        // 敵人反擊
        let enemyAttackTimer = 0;
        
        // 真人位置 (鏡頭偵測到的人)
        let enemyScreenX = 0.5;
        let enemyScreenY = 0.5;
        
        let animationId = null;

        // ========== 搖桿初始化 ==========
        function initJoystick() {
            const rect = joystickBase.getBoundingClientRect();
            joystickCenter.x = rect.left + rect.width / 2;
            joystickCenter.y = rect.top + rect.height / 2;
            joystickRadius = rect.width / 2 - 10;
        }

        function updateJoystickPosition(e) {
            if (!joystickActive) return;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let dx = clientX - joystickCenter.x;
            let dy = clientY - joystickCenter.y;
            let dist = Math.hypot(dx, dy);
            if (dist > joystickRadius) {
                dx = dx / dist * joystickRadius;
                dy = dy / dist * joystickRadius;
            }
            joystickVector.x = dx / joystickRadius;
            joystickVector.y = dy / joystickRadius;
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        function onJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
            updateJoystickPosition(e);
        }

        function onJoystickEnd() {
            joystickActive = false;
            joystickVector = { x: 0, y: 0 };
            joystickThumb.style.transform = 'translate(-50%, -50%)';
        }

        joystickBase.addEventListener('touchstart', onJoystickStart);
        joystickBase.addEventListener('touchmove', updateJoystickPosition);
        joystickBase.addEventListener('touchend', onJoystickEnd);
        window.addEventListener('resize', initJoystick);

        // ========== 移動刀盾戰士 ==========
        function updateWarriorPosition() {
            if (!gameRunning) return;
            warriorX += joystickVector.x * MOVE_SPEED;
            warriorY += joystickVector.y * MOVE_SPEED;
            warriorX = Math.min(0.88, Math.max(0.12, warriorX));
            warriorY = Math.min(0.85, Math.max(0.15, warriorY));
        }

        // ========== 血條更新 ==========
        function updateHealthBars() {
            playerHealthFill.style.width = `${Math.max(0, playerHealth)}%`;
            enemyHealthFill.style.width = `${Math.max(0, enemyHealth)}%`;
        }

        // ========== 特效 ==========
        function showDamagePopup(damage, isEnemy, x, y) {
            const pop = document.createElement('div');
            pop.className = 'damage-pop';
            pop.textContent = `-${damage}!`;
            pop.style.left = x || (isEnemy ? '70%' : '25%');
            pop.style.top = y || '35%';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 500);
        }

        function flashScreen(color, alpha = 0.35) {
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            setTimeout(() => { if (gameRunning) ctx.clearRect(0, 0, canvas.width, canvas.height); }, 100);
        }

        // ========== 連擊系統 ==========
        function addCombo() {
            combo++;
            comboDisplay.innerHTML = `⚔️ 連擊 ${combo} ⚔️`;
            comboDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => { if(comboDisplay) comboDisplay.style.transform = 'scale(1)'; }, 150);
            if (comboTimeout) clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo = 0;
                comboDisplay.innerHTML = `⚔️ 連擊 0 ⚔️`;
            }, 3000);
        }

        function resetCombo() {
            combo = 0;
            comboDisplay.innerHTML = `⚔️ 連擊 0 ⚔️`;
            if (comboTimeout) clearTimeout(comboTimeout);
        }

        // ========== 攻擊！砍真人 ==========
        function tryAttack() {
            if (!gameRunning || !cameraReady) return false;
            if (!canAttack) {
                statusDiv.innerText = "⏳ 冷卻中...";
                return false;
            }
            if (!faceDetected) {
                statusDiv.innerText = "❌ 鏡頭前沒人！敵人在哪？";
                return false;
            }
            if (isLookingAway) {
                statusDiv.innerText = "⚠️ 你轉頭了！無法攻擊！";
                return false;
            }
            
            // 計算刀盾戰士和真人的距離
            const warriorScreenX = warriorX * canvas.width;
            const warriorScreenY = warriorY * canvas.height;
            const enemyScreenPosX = enemyScreenX * canvas.width;
            const enemyScreenPosY = enemyScreenY * canvas.height;
            const distance = Math.hypot(warriorScreenX - enemyScreenPosX, warriorScreenY - enemyScreenPosY);
            
            if (distance > 130) {
                statusDiv.innerText = "❌ 太遠了！用搖桿靠近真人再砍！";
                return false;
            }
            
            // 攻擊成功
            canAttack = false;
            attackCooldown = 18;
            
            const damage = 12 + Math.floor(combo / 5);
            enemyHealth = Math.max(0, enemyHealth - damage);
            updateHealthBars();
            showDamagePopup(damage, true, enemyScreenPosX, enemyScreenPosY - 50);
            flashScreen('#ff3300', 0.4);
            addCombo();
            
            statusDiv.innerText = `⚔️ 砍中真人！ -${damage} ⚔️`;
            if (navigator.vibrate) navigator.vibrate(50);
            
            if (enemyHealth <= 0) {
                gameRunning = false;
                const div = document.createElement('div');
                div.className = 'game-over';
                div.innerHTML = `
                    <div>🏆 勝利！ 🏆</div>
                    <div style="font-size:24px">連擊數: ${combo}</div>
                    <button onclick="location.reload()">⚔️ 再玩一次 ⚔️</button>
                `;
                document.body.appendChild(div);
            }
            return true;
        }

        // ========== 防禦 ==========
        function startDefense() {
            if (!gameRunning) return;
            if (defendTimer) clearTimeout(defendTimer);
            isDefending = true;
            statusDiv.innerText = "🛡️ 防禦中！ 🛡️";
            flashScreen('#4488ff', 0.25);
            if (navigator.vibrate) navigator.vibrate(30);
            
            defendTimer = setTimeout(() => {
                isDefending = false;
                if (gameRunning && !forcedDefense) {
                    statusDiv.innerText = "🎮 搖桿移動戰士 | 靠近真人攻擊";
                }
            }, 700);
        }

        // ========== 玩家受傷 ==========
        function damagePlayer(amount) {
            if (!gameRunning) return;
            
            if (isDefending) {
                statusDiv.innerText = "🛡️ 防禦成功！";
                flashScreen('#4488ff', 0.2);
                return;
            }
            
            playerHealth = Math.max(0, playerHealth - amount);
            updateHealthBars();
            showDamagePopup(amount, false, '30%', '35%');
            flashScreen('#ffffff', 0.5);
            statusDiv.innerText = `💔 受傷 -${amount} 💔`;
            resetCombo();
            
            if (navigator.vibrate) navigator.vibrate(100);
            
            if (playerHealth <= 0) {
                gameRunning = false;
                const div = document.createElement('div');
                div.className = 'game-over';
                div.innerHTML = `
                    <div>💀 戰敗 💀</div>
                    <div style="font-size:20px">${isLookingAway ? '轉頭沒防禦' : '血量歸零'}</div>
                    <button onclick="location.reload()">🔄 重來</button>
                `;
                document.body.appendChild(div);
            }
        }

        // ========== 敵人反擊 ==========
        function updateEnemyCounter() {
            if (!gameRunning) return;
            if (enemyHealth <= 0) return;
            
            if (enemyAttackTimer <= 0) {
                if (faceDetected && !isLookingAway) {
                    // 計算距離，太遠不會反擊
                    const warriorXpx = warriorX * canvas.width;
                    const warriorYpx = warriorY * canvas.height;
                    const enemyXpx = enemyScreenX * canvas.width;
                    const enemyYpx = enemyScreenY * canvas.height;
                    const dist = Math.hypot(warriorXpx - enemyXpx, warriorYpx - enemyYpx);
                    if (dist < 160) {
                        damagePlayer(9);
                    }
                    enemyAttackTimer = 45;
                }
            } else {
                enemyAttackTimer--;
            }
        }

        // ========== 人體/膚色偵測 (抓真人位置) ==========
        function isSkinColor(r, g, b) {
            return (r > 65 && g > 35 && b > 20 && Math.abs(r - g) > 8 && r > g && r > b);
        }

        function detectHumanCenter(imageData) {
            const data = imageData.data;
            const w = imageData.width;
            const h = imageData.height;
            let skinPixels = 0;
            let sumX = 0, sumY = 0;
            let centerSkin = 0;
            const centerStartX = w * 0.25;
            const centerEndX = w * 0.75;
            
            for (let y = 0; y < h; y += 5) {
                for (let x = 0; x < w; x += 5) {
                    const idx = (y * w + x) * 4;
                    if (isSkinColor(data[idx], data[idx+1], data[idx+2])) {
                        skinPixels++;
                        sumX += x;
                        sumY += y;
                        if (x >= centerStartX && x <= centerEndX) {
                            centerSkin++;
                        }
                    }
                }
            }
            
            const totalSampled = (w * h) / 25;
            const skinRatio = skinPixels / totalSampled;
            const humanDetected = skinRatio > 0.012;
            
            let lookingAway = false;
            let centerX = 0.5, centerY = 0.5;
            
            if (humanDetected && skinPixels > 0) {
                centerX = sumX / skinPixels / w;
                centerY = sumY / skinPixels / h;
                const centerRatio = centerSkin / totalSampled;
                if (centerRatio < skinRatio * 0.45) {
                    lookingAway = true;
                }
            } else {
                lookingAway = true;
            }
            
            return { humanDetected, lookingAway, centerX, centerY };
        }

        // ========== 繪製刀盾戰士 (可移動) ==========
        function drawWarrior() {
            if (!canvas.width || !canvas.height) return;
            
            const w = canvas.width;
            const h = canvas.height;
            const x = warriorX * w;
            const y = warriorY * h;
            
            // 底盤光環
            ctx.beginPath();
            ctx.arc(x, y, 55, 0, Math.PI * 2);
            ctx.fillStyle = faceDetected ? 'rgba(0,200,100,0.2)' : 'rgba(200,0,0,0.2)';
            ctx.fill();
            ctx.strokeStyle = faceDetected ? '#00ff88' : '#ff4444';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 頭盔
            ctx.beginPath();
            ctx.arc(x, y - 30, 32, 0, Math.PI * 2);
            ctx.fillStyle = '#3a6ea5';
            ctx.fill();
            ctx.strokeStyle = '#ffcc88';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 眼睛
            ctx.fillStyle = '#ffccaa';
            ctx.beginPath();
            ctx.arc(x - 12, y - 38, 6, 0, Math.PI * 2);
            ctx.arc(x + 12, y - 38, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // 表情（生氣/正常）
            ctx.beginPath();
            if (faceDetected && !isLookingAway) {
                ctx.arc(x, y - 22, 10, 0.1, Math.PI - 0.1);
            } else {
                ctx.arc(x, y - 22, 8, 0, Math.PI);
            }
            ctx.stroke();
            
            // 身體鎧甲
            ctx.fillStyle = '#2a5f8f';
            ctx.fillRect(x - 30, y - 5, 60, 55);
            
            // 鎧甲細節
            ctx.fillStyle = '#ffaa66';
            ctx.fillRect(x - 20, y + 10, 40, 10);
            
            // 盾牌 (左手)
            ctx.fillStyle = '#cc8844';
            ctx.beginPath();
            ctx.ellipse(x - 42, y + 8, 20, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa66';
            ctx.font = "32px monospace";
            ctx.fillText("🛡️", x - 55, y + 15);
            
            // 劍 (右手)
            ctx.beginPath();
            ctx.moveTo(x + 35, y + 2);
            ctx.lineTo(x + 75, y - 20);
            ctx.lineTo(x + 68, y - 26);
            ctx.fillStyle = '#ddddff';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = "34px monospace";
            ctx.fillText("⚔️", x + 45, y - 12);
            
            // 名稱標籤
            ctx.font = "bold 16px monospace";
            ctx.fillStyle = '#ffdd99';
            ctx.shadowBlur = 0;
            ctx.fillText("🗡️ 刀盾勇士 🛡️", x - 55, y - 55);
            
            // 防禦狀態文字
            if (isDefending) {
                ctx.fillStyle = '#44aaff';
                ctx.font = "bold 24px monospace";
                ctx.fillText("🛡️ 防禦中", x - 45, y + 55);
            }
            
            // 畫線連接到真人
            if (faceDetected && !isLookingAway) {
                const ex = enemyScreenX * w;
                const ey = enemyScreenY * h;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(ex, ey);
                ctx.strokeStyle = '#ffaa44';
                ctx.setLineDash([8, 10]);
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // ========== 主遊戲循環 ==========
        function gameLoop() {
            if (!gameRunning) return;
            
            updateWarriorPosition();
            updateEnemyCounter();
            
            if (!canAttack) {
                attackCooldown--;
                if (attackCooldown <= 0) canAttack = true;
            }
            
            if (cameraReady && video.readyState >= 2 && video.videoWidth > 0) {
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    initJoystick();
                }
                
                // 畫相機畫面
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 偵測人體
                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const { humanDetected, lookingAway, centerX, centerY } = detectHumanCenter(imageData);
                    faceDetected = humanDetected;
                    isLookingAway = lookingAway;
                    if (faceDetected) {
                        enemyScreenX = centerX;
                        enemyScreenY = centerY;
                    }
                } catch(e) {}
                
                // 轉頭防禦機制
                if (isLookingAway) {
                    if (!forcedDefense) {
                        forcedDefense = true;
                        warningDiv.style.display = 'block';
                        statusDiv.innerText = "⚠️ 轉頭了！快按防禦！ ⚠️";
                        setTimeout(() => {
                            if (forcedDefense && !isDefending && gameRunning) {
                                gameRunning = false;
                                const div = document.createElement('div');
                                div.className = 'game-over';
                                div.innerHTML = `
                                    <div>💀 轉頭沒防禦 💀</div>
                                    <button onclick="location.reload()">🔄 重來</button>
                                `;
                                document.body.appendChild(div);
                            }
                        }, 800);
                    }
                } else {
                    forcedDefense = false;
                    warningDiv.style.display = 'none';
                }
                
                drawWarrior();
                
            } else if (cameraReady) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawWarrior();
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }

        // ========== 開啟鏡頭 ==========
        async function startCamera() {
            try {
                statusDiv.innerText = "📷 請求鏡頭權限...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                await video.play();
                cameraReady = true;
                statusDiv.innerText = "✅ 鏡頭開啟！用搖桿移動戰士靠近真人！";
                
                await new Promise(resolve => {
                    const check = setInterval(() => {
                        if (video.videoWidth > 0) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                });
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                initJoystick();
                
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "❌ 無法開啟鏡頭，請檢查權限";
                cameraReady = false;
            }
        }

        // ========== 事件綁定 ==========
        attackBtn.addEventListener('click', (e) => { e.preventDefault(); tryAttack(); });
        attackBtn.addEventListener('touchstart', (e) => { e.preventDefault(); tryAttack(); });
        defendBtn.addEventListener('click', (e) => { e.preventDefault(); startDefense(); });
        defendBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startDefense(); });
        
        startOverlay.addEventListener('click', async () => {
            startOverlay.style.opacity = '0';
            setTimeout(() => startOverlay.remove(), 500);
            await startCamera();
            gameLoop();
        });
        
        // 初始化
        updateHealthBars();
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initJoystick();
    </script>
</body>
</html>
