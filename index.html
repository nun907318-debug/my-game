<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的刀盾 - TikTok體感砍殺遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'PingFang TC', 'Segoe UI', 'Helvetica Neue', monospace;
            touch-action: none;
        }

        /* 相機全螢幕 */
        #camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        /* AR 繪圖層 */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* UI 面板 */
        .ui-panel {
            position: fixed;
            z-index: 10;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 8px 18px;
            color: white;
            font-weight: bold;
            border: 2px solid #ffd966;
            font-family: monospace;
        }

        .health-bar-container {
            top: 20px;
            left: 20px;
            width: 200px;
        }

        .enemy-health {
            top: 20px;
            right: 20px;
            width: 200px;
            text-align: right;
        }

        .health-label {
            font-size: 12px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .health-bg {
            background: #330000;
            border-radius: 20px;
            height: 18px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .enemy-health .health-fill {
            background: linear-gradient(90deg, #ff8844, #ff4400);
        }

        .status-panel {
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
            font-size: 14px;
            background: rgba(0,0,0,0.85);
        }

        .combo-panel {
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 10px orange;
            background: rgba(0,0,0,0.6);
            border-color: #ffaa44;
            white-space: nowrap;
        }

        /* 按鈕 */
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.05s linear;
        }

        .attack-btn {
            border-color: #ff4444;
            background: rgba(180,0,0,0.8);
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }

        .defend-btn {
            border-color: #44aaff;
            background: rgba(0,80,120,0.8);
            box-shadow: 0 0 15px rgba(68,170,255,0.3);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        /* 警告 */
        .warning {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-size: 34px;
            font-weight: bold;
            color: #ff0000;
            background: rgba(0,0,0,0.95);
            padding: 18px 36px;
            border-radius: 60px;
            border: 4px solid red;
            animation: pulseWarning 0.3s infinite;
            display: none;
            white-space: nowrap;
            font-family: monospace;
            text-align: center;
            letter-spacing: 4px;
        }

        @keyframes pulseWarning {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 0 red; }
            100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); text-shadow: 0 0 20px red; }
        }

        /* 攻擊特效文字 */
        .damage-pop {
            position: fixed;
            font-size: 36px;
            font-weight: bold;
            color: #ff6600;
            text-shadow: 0 0 10px red;
            z-index: 15;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        /* 開始畫面 */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e, #000000);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        .start-title {
            font-size: 58px;
            color: #ffd966;
            text-shadow: 0 0 25px rgba(255,217,102,0.6);
            font-family: monospace;
            letter-spacing: 8px;
        }

        .start-sub {
            font-size: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 14px 28px;
            border-radius: 60px;
            border: 2px solid #ffd966;
        }

        .start-hint {
            font-size: 14px;
            color: #aaa;
            margin-top: 20px;
        }

        /* 遊戲結束 */
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 52px;
            color: white;
            gap: 30px;
            backdrop-filter: blur(8px);
        }

        .game-over button {
            padding: 16px 44px;
            font-size: 24px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .game-over button:active {
            transform: scale(0.95);
        }

        .instruction {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel health-bar-container">
        <div class="health-label">❤️ 你的生命</div>
        <div class="health-bg"><div class="health-fill" id="playerHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel enemy-health">
        <div class="health-label">👹 敵人生命 (真人)</div>
        <div class="health-bg"><div class="health-fill" id="enemyHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel combo-panel" id="comboDisplay">
        ⚔️ 連擊 0 ⚔️
    </div>

    <div class="status-panel ui-panel" id="statusText">
        🎮 點擊攻擊按鈕砍殺真人
    </div>

    <div class="action-buttons">
        <div class="action-btn attack-btn" id="attackBtn">⚔️</div>
        <div class="action-btn defend-btn" id="defendBtn">🛡️</div>
    </div>

    <div id="warning" class="warning">⚠️ 轉頭防禦！ ⚠️</div>

    <div class="instruction">
        📷 真人站在鏡頭前 | 按⚔️攻擊 | 轉頭時按🛡️防禦
    </div>

    <div class="start-overlay" id="startOverlay">
        <div class="start-title">🗡️ 我的刀盾 🛡️</div>
        <div class="start-sub">⚔️ 點擊開啟鏡頭，砍真人！ ⚔️</div>
        <div class="start-hint">📷 需要允許相機權限</div>
    </div>

    <script>
        // ========== DOM 元素 ==========
        const video = document.getElementById('camera');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerHealthFill = document.getElementById('playerHealthFill');
        const enemyHealthFill = document.getElementById('enemyHealthFill');
        const statusDiv = document.getElementById('statusText');
        const warningDiv = document.getElementById('warning');
        const comboDisplay = document.getElementById('comboDisplay');
        const attackBtn = document.getElementById('attackBtn');
        const defendBtn = document.getElementById('defendBtn');
        const startOverlay = document.getElementById('startOverlay');

        // ========== 遊戲狀態 ==========
        let playerHealth = 100;
        let enemyHealth = 100;
        let gameRunning = true;
        let cameraReady = false;
        
        // 人臉/人體偵測
        let faceDetected = false;
        let isLookingAway = false;
        
        // 防禦系統
        let isDefending = false;
        let forcedDefense = false;
        let defendTimer = null;
        
        // 攻擊系統
        let canAttack = true;
        let attackCooldown = 0;
        let combo = 0;
        let comboTimeout = null;
        
        // 敵人反擊
        let enemyAttackTimer = 0;
        
        // 特效
        let damagePopups = [];
        
        let stream = null;
        let animationId = null;

        // ========== 更新血條 ==========
        function updateHealthBars() {
            playerHealthFill.style.width = `${Math.max(0, playerHealth)}%`;
            enemyHealthFill.style.width = `${Math.max(0, enemyHealth)}%`;
        }

        // ========== 顯示傷害數字 ==========
        function showDamagePopup(damage, isEnemy) {
            const pop = document.createElement('div');
            pop.className = 'damage-pop';
            pop.textContent = `-${damage}!`;
            pop.style.left = isEnemy ? '70%' : '30%';
            pop.style.top = '40%';
            pop.style.color = isEnemy ? '#ff8844' : '#ff4444';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);
        }

        // ========== 攻擊特效 (畫面閃紅) ==========
        function flashScreen(color, alpha = 0.3) {
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            setTimeout(() => {
                if (gameRunning) ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 100);
        }

        // ========== 連擊系統 ==========
        function addCombo() {
            combo++;
            comboDisplay.innerHTML = `⚔️ 連擊 ${combo} ⚔️`;
            comboDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => { if(comboDisplay) comboDisplay.style.transform = 'scale(1)'; }, 150);
            
            if (comboTimeout) clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo = 0;
                comboDisplay.innerHTML = `⚔️ 連擊 0 ⚔️`;
            }, 3000);
        }

        function resetCombo() {
            combo = 0;
            comboDisplay.innerHTML = `⚔️ 連擊 0 ⚔️`;
            if (comboTimeout) clearTimeout(comboTimeout);
        }

        // ========== 攻擊！砍真人 ==========
        function tryAttack() {
            if (!gameRunning) return false;
            if (!cameraReady) {
                statusDiv.innerText = "❌ 鏡頭未開啟";
                return false;
            }
            if (!canAttack) {
                statusDiv.innerText = "⏳ 冷卻中...";
                return false;
            }
            if (!faceDetected) {
                statusDiv.innerText = "❌ 鏡頭前沒人！敵人在哪？";
                return false;
            }
            if (isLookingAway) {
                statusDiv.innerText = "⚠️ 你轉頭了！無法攻擊！";
                return false;
            }
            
            // 攻擊成功
            canAttack = false;
            attackCooldown = 18;  // 冷卻幀數
            
            const damage = 12 + Math.floor(combo / 5); // 連擊加成
            enemyHealth = Math.max(0, enemyHealth - damage);
            updateHealthBars();
            showDamagePopup(damage, true);
            flashScreen('#ff3300', 0.4);
            addCombo();
            
            statusDiv.innerText = `⚔️ 砍中真人！ -${damage} ⚔️`;
            
            // 震動
            if (navigator.vibrate) navigator.vibrate(50);
            
            // 勝利判定
            if (enemyHealth <= 0) {
                gameRunning = false;
                const div = document.createElement('div');
                div.className = 'game-over';
                div.innerHTML = `
                    <div>🏆 勝利！ 🏆</div>
                    <div style="font-size:24px">連擊數: ${combo}</div>
                    <button onclick="location.reload()">⚔️ 再玩一次 ⚔️</button>
                `;
                document.body.appendChild(div);
            }
            
            return true;
        }

        // ========== 防禦 ==========
        function startDefense() {
            if (!gameRunning) return;
            if (defendTimer) clearTimeout(defendTimer);
            isDefending = true;
            statusDiv.innerText = "🛡️ 防禦中！ 🛡️";
            flashScreen('#4488ff', 0.25);
            if (navigator.vibrate) navigator.vibrate(30);
            
            defendTimer = setTimeout(() => {
                isDefending = false;
                if (gameRunning && !forcedDefense) {
                    statusDiv.innerText = "🗡️ 點攻擊砍真人 🛡️";
                }
            }, 700);
        }

        // ========== 玩家受傷 ==========
        function damagePlayer(amount) {
            if (!gameRunning) return;
            
            if (isDefending) {
                statusDiv.innerText = "🛡️ 防禦成功！格擋！";
                flashScreen('#4488ff', 0.2);
                return;
            }
            
            playerHealth = Math.max(0, playerHealth - amount);
            updateHealthBars();
            showDamagePopup(amount, false);
            flashScreen('#ffffff', 0.5);
            statusDiv.innerText = `💔 受傷 -${amount} 💔`;
            resetCombo();
            
            if (navigator.vibrate) navigator.vibrate(100);
            
            if (playerHealth <= 0) {
                gameRunning = false;
                const div = document.createElement('div');
                div.className = 'game-over';
                div.innerHTML = `
                    <div>💀 戰敗 💀</div>
                    <div style="font-size:20px">${isLookingAway ? '轉頭沒防禦' : '血量歸零'}</div>
                    <button onclick="location.reload()">🔄 重來</button>
                `;
                document.body.appendChild(div);
            }
        }

        // ========== 敵人反擊 AI ==========
        function updateEnemyCounter() {
            if (!gameRunning) return;
            if (enemyHealth <= 0) return;
            
            if (enemyAttackTimer <= 0) {
                // 只有鏡頭前有真人才會反擊
                if (faceDetected && !isLookingAway) {
                    damagePlayer(10);
                    enemyAttackTimer = 45;  // 約0.7秒反擊一次
                }
            } else {
                enemyAttackTimer--;
            }
        }

        // ========== 膚色/人臉偵測 ==========
        function isSkinColor(r, g, b) {
            // 膚色範圍（適合各種膚色）
            return (r > 65 && g > 35 && b > 20 && 
                    Math.abs(r - g) > 8 && 
                    r > g && r > b);
        }

        function detectHumanAndDirection(imageData) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            let totalSkin = 0;
            let centerSkin = 0;
            
            const centerStartX = width * 0.25;
            const centerEndX = width * 0.75;
            
            // 降取樣加速
            for (let y = 0; y < height; y += 6) {
                for (let x = 0; x < width; x += 6) {
                    const idx = (y * width + x) * 4;
                    const r = data[idx];
                    const g = data[idx+1];
                    const b = data[idx+2];
                    
                    if (isSkinColor(r, g, b)) {
                        totalSkin++;
                        if (x >= centerStartX && x <= centerEndX) {
                            centerSkin++;
                        }
                    }
                }
            }
            
            const totalSampled = (width * height) / 36;
            const skinRatio = totalSkin / totalSampled;
            const centerRatio = centerSkin / totalSampled;
            
            const humanDetected = skinRatio > 0.012;
            let lookingAway = false;
            
            if (humanDetected) {
                // 如果中央膚色少於總膚色的一半 => 轉頭
                if (centerRatio < skinRatio * 0.45) {
                    lookingAway = true;
                }
            } else {
                lookingAway = true;  // 沒人 = 轉頭
            }
            
            return { humanDetected, lookingAway };
        }

        // ========== 繪製 AR 刀盾戰士 ==========
        function drawARWarrior() {
            if (!canvas.width || !canvas.height) return;
            
            const w = canvas.width;
            const h = canvas.height;
            const centerX = w / 2;
            const centerY = h / 2;
            
            // 繪製半透明圓形光環（代表玩家位置）
            ctx.beginPath();
            ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
            ctx.fillStyle = faceDetected ? 'rgba(0,200,100,0.15)' : 'rgba(200,0,0,0.15)';
            ctx.fill();
            ctx.strokeStyle = faceDetected ? '#00ff88' : '#ff4444';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 繪製刀盾戰士（簡單但酷炫）
            // 頭盔
            ctx.beginPath();
            ctx.arc(centerX, centerY - 30, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#3a6ea5';
            ctx.fill();
            ctx.strokeStyle = '#ffcc88';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 臉部（表情根據狀態）
            ctx.fillStyle = '#ffccaa';
            ctx.beginPath();
            ctx.arc(centerX - 12, centerY - 38, 6, 0, Math.PI * 2);
            ctx.arc(centerX + 12, centerY - 38, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // 生氣/正常表情
            if (faceDetected && !isLookingAway) {
                ctx.beginPath();
                ctx.arc(centerX, centerY - 22, 10, 0.1, Math.PI - 0.1);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(centerX, centerY - 22, 8, 0, Math.PI);
                ctx.stroke();
            }
            
            // 身體
            ctx.fillStyle = '#2a5f8f';
            ctx.fillRect(centerX - 30, centerY - 5, 60, 55);
            
            // 盾牌（左手）
            ctx.fillStyle = '#cc8844';
            ctx.beginPath();
            ctx.ellipse(centerX - 40, centerY + 10, 20, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa66';
            ctx.font = "28px monospace";
            ctx.fillText("🛡️", centerX - 52, centerY + 18);
            
            // 劍（右手）
            ctx.beginPath();
            ctx.moveTo(centerX + 35, centerY + 5);
            ctx.lineTo(centerX + 70, centerY - 15);
            ctx.lineTo(centerX + 65, centerY - 20);
            ctx.fillStyle = '#ddddff';
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = "32px monospace";
            ctx.fillText("⚔️", centerX + 45, centerY - 10);
            
            // 狀態文字
            ctx.font = "bold 18px monospace";
            ctx.fillStyle = faceDetected ? '#88ff88' : '#ff8888';
            ctx.shadowBlur = 0;
            ctx.fillText(faceDetected ? "✓ 鎖定目標" : "✗ 無人可砍", centerX - 60, centerY - 70);
            
            if (isDefending) {
                ctx.fillStyle = '#44aaff';
                ctx.font = "bold 28px monospace";
                ctx.fillText("🛡️ 防禦狀態 🛡️", centerX - 70, centerY + 60);
            }
        }

        // ========== 主遊戲循環 ==========
        function gameLoop() {
            if (!gameRunning) {
                if (animationId) cancelAnimationFrame(animationId);
                return;
            }
            
            // 更新冷卻
            if (!canAttack) {
                attackCooldown--;
                if (attackCooldown <= 0) canAttack = true;
            }
            
            // 敵人反擊
            updateEnemyCounter();
            
            // 處理鏡頭和AR繪圖
            if (cameraReady && video.readyState >= 2 && video.videoWidth > 0) {
                // 設定畫布尺寸
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                
                // 繪製鏡頭畫面
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 分析畫面（偵測人臉和轉頭）
                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const { humanDetected, lookingAway } = detectHumanAndDirection(imageData);
                    faceDetected = humanDetected;
                    isLookingAway = lookingAway;
                } catch(e) {
                    console.warn("分析失敗", e);
                }
                
                // 轉頭防禦機制
                if (isLookingAway) {
                    if (!forcedDefense) {
                        forcedDefense = true;
                        warningDiv.style.display = 'block';
                        statusDiv.innerText = "⚠️ 轉頭警報！快按防禦！ ⚠️";
                        
                        // 0.8秒內沒防禦就輸
                        setTimeout(() => {
                            if (forcedDefense && !isDefending && gameRunning) {
                                gameRunning = false;
                                const div = document.createElement('div');
                                div.className = 'game-over';
                                div.innerHTML = `
                                    <div>💀 轉頭沒防禦 💀</div>
                                    <button onclick="location.reload()">🔄 重來</button>
                                `;
                                document.body.appendChild(div);
                            }
                        }, 800);
                    }
                } else {
                    forcedDefense = false;
                    warningDiv.style.display = 'none';
                }
                
                // 畫 AR 刀盾戰士
                drawARWarrior();
                
            } else if (cameraReady) {
                // 鏡頭準備中
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawARWarrior();
                ctx.fillStyle = 'white';
                ctx.font = '20px monospace';
                ctx.fillText('等待鏡頭畫面...', canvas.width/2-100, canvas.height/2);
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }

        // ========== 開啟鏡頭 ==========
        async function startCamera() {
            try {
                statusDiv.innerText = "📷 請求鏡頭權限...";
                const constraints = {
                    video: {
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                cameraReady = true;
                statusDiv.innerText = "✅ 鏡頭已開啟！把真人放進畫面中央！";
                
                // 等待取得畫面尺寸
                await new Promise(resolve => {
                    const check = setInterval(() => {
                        if (video.videoWidth > 0) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                });
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "❌ 無法開啟鏡頭，請檢查權限";
                cameraReady = false;
            }
        }

        // ========== 事件綁定 ==========
        attackBtn.addEventListener('click', (e) => {
            e.preventDefault();
            tryAttack();
        });
        
        attackBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            tryAttack();
        });
        
        defendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            startDefense();
        });
        
        defendBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDefense();
        });
        
        // 開始遊戲
        startOverlay.addEventListener('click', async () => {
            startOverlay.style.opacity = '0';
            setTimeout(() => startOverlay.style.display = 'none', 500);
            await startCamera();
            gameLoop();
        });
        
        // 初始化
        updateHealthBars();
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    </script>
</body>
</html>
