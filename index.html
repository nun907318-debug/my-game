<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的刀盾 - 3D版 砍真人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
        }

        /* 相機畫面 (小視窗) */
        .camera-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #ffd966;
            z-index: 20;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #videoCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* UI 血條 */
        .ui-panel {
            position: fixed;
            z-index: 15;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-weight: bold;
            border: 2px solid #ff4444;
            font-family: monospace;
        }

        .health-bar-container {
            top: 20px;
            left: 20px;
            width: 220px;
        }

        .enemy-health {
            top: 20px;
            right: 20px;
            width: 220px;
            text-align: right;
        }

        .health-label {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .health-bg {
            background: #330000;
            border-radius: 20px;
            height: 18px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .status-panel {
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
            border-color: #ffd966;
        }

        /* 虛擬搖桿 */
        .joystick-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 20;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(30,30,50,0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .joystick-thumb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: rgba(255,215,0,0.9);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            transition: 0.02s linear;
            pointer-events: none;
        }

        /* 攻擊防禦按鈕 */
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .attack-btn {
            border-color: #ff4444;
            background: rgba(180,0,0,0.8);
        }

        .defend-btn {
            border-color: #44aaff;
            background: rgba(0,80,120,0.8);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .defend-warning {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            font-size: 28px;
            font-weight: bold;
            color: red;
            background: rgba(0,0,0,0.9);
            padding: 16px 32px;
            border-radius: 60px;
            border: 3px solid red;
            animation: pulse 0.3s infinite;
            display: none;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.05); }
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 48px;
            color: white;
            gap: 30px;
        }

        .game-over button {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e, #000);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            cursor: pointer;
        }

        .start-title {
            font-size: 56px;
            color: #ffd966;
            text-shadow: 0 0 20px rgba(255,217,102,0.5);
        }

        .start-sub {
            font-size: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid #ffd966;
        }
    </style>
</head>
<body>
    <div class="camera-preview">
        <video id="videoCanvas" autoplay playsinline muted></video>
    </div>

    <div class="ui-panel health-bar-container">
        <div class="health-label">❤️ 玩家血量</div>
        <div class="health-bg"><div class="health-fill" id="playerHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel enemy-health">
        <div class="health-label">👹 敵人血量 (鏡頭真人)</div>
        <div class="health-bg"><div class="health-fill" id="enemyHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="status-panel ui-panel" id="statusText">
        🎮 左搖桿移動 | ⚔️攻擊真人
    </div>

    <div class="joystick-container">
        <div class="joystick-base" id="joystickBase"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>

    <div class="action-buttons">
        <div class="action-btn attack-btn" id="attackBtn">⚔️</div>
        <div class="action-btn defend-btn" id="defendBtn">🛡️</div>
    </div>

    <div id="defendWarning" class="defend-warning">⚠️ 轉頭防禦！ ⚠️</div>

    <div class="start-overlay" id="startOverlay">
        <div class="start-title">🗡️ 我的刀盾 3D 🛡️</div>
        <div class="start-sub">⚔️ 點擊開啟鏡頭，砍真人！ ⚔️</div>
    </div>

    <!-- 引入 Three.js 和擴充 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========== DOM 元素 ==========
        const video = document.getElementById('videoCanvas');
        const playerHealthFill = document.getElementById('playerHealthFill');
        const enemyHealthFill = document.getElementById('enemyHealthFill');
        const statusDiv = document.getElementById('statusText');
        const defendWarning = document.getElementById('defendWarning');
        const attackBtn = document.getElementById('attackBtn');
        const defendBtn = document.getElementById('defendBtn');
        const startOverlay = document.getElementById('startOverlay');
        const joystickBase = document.getElementById('joystickBase');
        const joystickThumb = document.getElementById('joystickThumb');

        // ========== 遊戲狀態 ==========
        let playerHealth = 100;
        let enemyHealth = 100;
        let gameRunning = true;
        let cameraReady = false;
        let faceDetected = false;
        let isDefending = false;
        let forcedDefense = false;
        let canAttack = true;
        let attackCooldown = 0;
        let enemyAttackTimer = 0;
        let defendTimer = null;
        
        // 搖桿
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        let joystickCenter = { x: 0, y: 0 };
        let joystickRadius = 55;

        // 3D 相關
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // 2D 文字渲染器
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // 控制器 (追蹤玩家)
        // 不用 OrbitControls，改為第三人稱跟隨
        
        // ========== 燈光 ==========
        // 環境光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // 主光源方向光
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        // 背光補光
        const backLight = new THREE.PointLight(0x4466cc, 0.3);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        // 地面光
        const fillLight = new THREE.PointLight(0xffaa66, 0.2);
        fillLight.position.set(0, 1, 0);
        scene.add(fillLight);
        
        // ========== 地面 ==========
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(15, 15),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // 裝飾：競技場圍欄
        const ringColor = 0x66aaff;
        const ringMat = new THREE.MeshStandardMaterial({ color: ringColor, emissive: 0x224466 });
        for (let i = 0; i < 32; i++) {
            const angle = (i / 32) * Math.PI * 2;
            const x = Math.cos(angle) * 5.5;
            const z = Math.sin(angle) * 5.5;
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), ringMat);
            pillar.position.set(x, 0, z);
            pillar.castShadow = true;
            scene.add(pillar);
        }
        
        // ========== 玩家角色 (刀盾戰士) ==========
        const playerGroup = new THREE.Group();
        
        // 身體
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5, metalness: 0.6, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0;
        playerGroup.add(body);
        
        // 頭盔
        const headGeo = new THREE.SphereGeometry(0.45, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.2 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.7;
        head.castShadow = true;
        playerGroup.add(head);
        
        // 頭盔裝飾
        const crestGeo = new THREE.BoxGeometry(0.4, 0.15, 0.2);
        const crestMat = new THREE.MeshStandardMaterial({ color: 0xdd5533 });
        const crest = new THREE.Mesh(crestGeo, crestMat);
        crest.position.set(0, 0.95, 0.3);
        playerGroup.add(crest);
        
        // 盾牌 (左手)
        const shieldGeo = new THREE.BoxGeometry(0.5, 0.8, 0.1);
        const shieldMat = new THREE.MeshStandardMaterial({ color: 0xcc8844, metalness: 0.7 });
        const shield = new THREE.Mesh(shieldGeo, shieldMat);
        shield.position.set(-0.65, 0.2, 0.3);
        shield.castShadow = true;
        playerGroup.add(shield);
        
        // 劍 (右手)
        const bladeGeo = new THREE.BoxGeometry(0.1, 0.1, 0.8);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0xddddff, metalness: 0.9 });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.position.set(0.65, 0.2, 0.4);
        blade.castShadow = true;
        playerGroup.add(blade);
        
        const hiltGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        const hiltMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        const hilt = new THREE.Mesh(hiltGeo, hiltMat);
        hilt.position.set(0.65, 0.1, 0.4);
        playerGroup.add(hilt);
        
        playerGroup.position.set(0, 0, 0);
        playerGroup.castShadow = true;
        scene.add(playerGroup);
        
        // 玩家名稱標籤
        const playerDiv = document.createElement('div');
        playerDiv.textContent = '🗡️ 刀盾勇士 🛡️';
        playerDiv.style.color = '#ffdd99';
        playerDiv.style.fontSize = '16px';
        playerDiv.style.fontWeight = 'bold';
        playerDiv.style.textShadow = '1px 1px 0 black';
        const playerLabel = new CSS2DObject(playerDiv);
        playerLabel.position.set(0, 1.2, 0);
        playerGroup.add(playerLabel);
        
        // 敵人目標 (代表鏡頭真人，在場景中出現紅點)
        const enemyGroup = new THREE.Group();
        const enemyBody = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 1.1, 8), new THREE.MeshStandardMaterial({ color: 0xaa4444, emissive: 0x331111 }));
        enemyBody.castShadow = true;
        enemyGroup.add(enemyBody);
        const enemyHead = new THREE.Mesh(new THREE.SphereGeometry(0.48, 16, 16), new THREE.MeshStandardMaterial({ color: 0xdd9988 }));
        enemyHead.position.y = 0.75;
        enemyGroup.add(enemyHead);
        const enemyDiv = document.createElement('div');
        enemyDiv.textContent = '👤 真人敵人';
        enemyDiv.style.color = '#ff8888';
        enemyDiv.style.fontSize = '14px';
        const enemyLabel = new CSS2DObject(enemyDiv);
        enemyLabel.position.set(0, 1.25, 0);
        enemyGroup.add(enemyLabel);
        
        // 敵人位置隨鏡頭偵測到的真人移動（但為了3D感，讓他徘徊在玩家前方）
        enemyGroup.position.set(2, 0, 2);
        scene.add(enemyGroup);
        
        // 武器特效 (攻擊時)
        let slashEffect = null;
        
        function showSlash() {
            if (slashEffect) scene.remove(slashEffect);
            const geometry = new THREE.SphereGeometry(0.4, 6, 6);
            const material = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff2200, transparent: true });
            slashEffect = new THREE.Mesh(geometry, material);
            slashEffect.position.set(0.9, 0.4, 0.9);
            playerGroup.add(slashEffect);
            setTimeout(() => {
                if (slashEffect) scene.remove(slashEffect);
            }, 150);
        }
        
        function showDefendEffect() {
            const ringGeo = new THREE.RingGeometry(0.5, 0.9, 16);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2288ff, side: THREE.DoubleSide, transparent: true });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(-0.7, 0.3, 0.5);
            ring.lookAt(0, 0, 1);
            playerGroup.add(ring);
            setTimeout(() => playerGroup.remove(ring), 300);
        }
        
        // ========== 搖桿邏輯 ==========
        function initJoystick() {
            const rect = joystickBase.getBoundingClientRect();
            joystickCenter.x = rect.left + rect.width / 2;
            joystickCenter.y = rect.top + rect.height / 2;
            joystickRadius = rect.width / 2 - 10;
        }
        
        function updateJoystickPosition(e) {
            if (!joystickActive) return;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let dx = clientX - joystickCenter.x;
            let dy = clientY - joystickCenter.y;
            let dist = Math.hypot(dx, dy);
            if (dist > joystickRadius) {
                dx = dx / dist * joystickRadius;
                dy = dy / dist * joystickRadius;
            }
            joystickVector.x = dx / joystickRadius;
            joystickVector.y = dy / joystickRadius;
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }
        
        function handleJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
            updateJoystickPosition(e);
        }
        
        function handleJoystickEnd() {
            joystickActive = false;
            joystickVector = { x: 0, y: 0 };
            joystickThumb.style.transform = 'translate(-50%, -50%)';
        }
        
        joystickBase.addEventListener('touchstart', handleJoystickStart);
        joystickBase.addEventListener('touchmove', updateJoystickPosition);
        joystickBase.addEventListener('touchend', handleJoystickEnd);
        window.addEventListener('resize', () => { initJoystick(); });
        
        // ========== 遊戲邏輯 ==========
        function updateHealthBars() {
            playerHealthFill.style.width = `${Math.max(0, playerHealth)}%`;
            enemyHealthFill.style.width = `${Math.max(0, enemyHealth)}%`;
        }
        
        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            const div = document.createElement('div');
            div.className = 'game-over';
            div.innerHTML = `<div>💀 戰敗 💀</div><button onclick="location.reload()">🔄 重來</button>`;
            document.body.appendChild(div);
        }
        
        function tryAttack() {
            if (!gameRunning || !cameraReady) return;
            if (!canAttack) return;
            if (!faceDetected) {
                statusDiv.innerText = "❌ 鏡頭沒人！";
                return;
            }
            canAttack = false;
            attackCooldown = 20;
            const damage = 14;
            enemyHealth = Math.max(0, enemyHealth - damage);
            updateHealthBars();
            statusDiv.innerText = `⚔️ 砍中真人！ -${damage}`;
            showSlash();
            if (navigator.vibrate) navigator.vibrate(50);
            if (enemyHealth <= 0) {
                gameRunning = false;
                const winDiv = document.createElement('div');
                winDiv.className = 'game-over';
                winDiv.innerHTML = `<div>🏆 勝利 🏆</div><button onclick="location.reload()">再玩一次</button>`;
                document.body.appendChild(winDiv);
            }
        }
        
        function startDefense() {
            if (!gameRunning) return;
            if (defendTimer) clearTimeout(defendTimer);
            isDefending = true;
            statusDiv.innerText = "🛡️ 防禦中！";
            showDefendEffect();
            defendTimer = setTimeout(() => { isDefending = false; if(!forcedDefense) statusDiv.innerText = "🎮 搖桿移動 | 攻擊"; }, 700);
        }
        
        function damagePlayer(amount) {
            if (!gameRunning) return;
            if (isDefending) {
                statusDiv.innerText = "🛡️ 格擋！";
                return;
            }
            playerHealth = Math.max(0, playerHealth - amount);
            updateHealthBars();
            statusDiv.innerText = `💔 受傷 -${amount}`;
            if (navigator.vibrate) navigator.vibrate(100);
            if (playerHealth <= 0) gameOver();
        }
        
        // 膚色偵測
        function isSkinColor(r,g,b) { return (r>70 && g>35 && b>20 && Math.abs(r-g)>8 && r>g && r>b); }
        
        let lastFaceState = true;
        function analyzeFrame(imgData) {
            const data = imgData.data, w = imgData.width, h = imgData.height;
            let skin=0, centerSkin=0, centerStart=w*0.2, centerEnd=w*0.8;
            for(let y=0; y<h; y+=6) for(let x=0; x<w; x+=6) {
                const idx=(y*w+x)*4;
                if(isSkinColor(data[idx],data[idx+1],data[idx+2])) {
                    skin++;
                    if(x>=centerStart && x<=centerEnd) centerSkin++;
                }
            }
            const total = (w*h)/36, skinRatio = skin/total, centerRatio = centerSkin/total;
            const human = skinRatio > 0.012;
            let away = !human || (human && centerRatio < skinRatio*0.45);
            return { human, away };
        }
        
        // 鏡頭與更新
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                await video.play();
                cameraReady = true;
                statusDiv.innerText = "✅ 鏡頭OK！把真人放進畫面，攻擊！";
            } catch(e) {
                statusDiv.innerText = "❌ 鏡頭失敗";
            }
        }
        
        // 敵人AI：反擊 & 移動
        function updateEnemy() {
            if (!gameRunning) return;
            if (enemyAttackTimer <= 0 && faceDetected) {
                damagePlayer(8);
                enemyAttackTimer = 50;
            } else enemyAttackTimer--;
            // 敵人AI簡單移動追蹤玩家
            const dx = playerGroup.position.x - enemyGroup.position.x;
            const dz = playerGroup.position.z - enemyGroup.position.z;
            if (Math.abs(dx) > 0.5 || Math.abs(dz) > 0.5) {
                enemyGroup.position.x += Math.sign(dx) * 0.02;
                enemyGroup.position.z += Math.sign(dz) * 0.02;
            }
            // 面向玩家
            enemyGroup.lookAt(playerGroup.position);
        }
        
        // 玩家移動
        function updatePlayerMovement() {
            if (!gameRunning) return;
            let speed = 0.07;
            let newX = playerGroup.position.x + joystickVector.x * speed;
            let newZ = playerGroup.position.z + joystickVector.y * speed;
            if (Math.abs(newX) < 6) playerGroup.position.x = newX;
            if (Math.abs(newZ) < 6) playerGroup.position.z = newZ;
            // 旋轉面向移動方向
            if (joystickVector.x !== 0 || joystickVector.y !== 0) {
                let angle = Math.atan2(joystickVector.x, joystickVector.y);
                playerGroup.rotation.y = angle;
            }
        }
        
        // 第三人稱相機跟隨
        function updateCamera() {
            const targetPos = playerGroup.position.clone();
            camera.position.x = targetPos.x + 4;
            camera.position.z = targetPos.z + 6;
            camera.position.y = 3.5;
            camera.lookAt(targetPos);
        }
        
        // 動畫與偵測循環
        let frameId;
        let videoCanvas = document.createElement('canvas');
        let videoCtx = videoCanvas.getContext('2d');
        
        async function gameLoop() {
            if (!gameRunning) return;
            updatePlayerMovement();
            updateEnemy();
            updateCamera();
            
            if (!canAttack) { attackCooldown--; if(attackCooldown<=0) canAttack=true; }
            
            if (cameraReady && video.readyState >= 2 && video.videoWidth) {
                videoCanvas.width = video.videoWidth;
                videoCanvas.height = video.videoHeight;
                videoCtx.drawImage(video, 0, 0, videoCanvas.width, videoCanvas.height);
                const imgData = videoCtx.getImageData(0,0,videoCanvas.width,videoCanvas.height);
                const { human, away } = analyzeFrame(imgData);
                faceDetected = human;
                if (away) {
                    if (!forcedDefense) {
                        forcedDefense = true;
                        defendWarning.style.display = 'block';
                        statusDiv.innerText = "⚠️ 轉頭！快防禦！";
                        setTimeout(() => {
                            if (forcedDefense && !isDefending && gameRunning) gameOver();
                        }, 900);
                    }
                } else {
                    forcedDefense = false;
                    defendWarning.style.display = 'none';
                }
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }
        
        // 事件
        attackBtn.addEventListener('click', (e) => { e.preventDefault(); tryAttack(); });
        defendBtn.addEventListener('click', (e) => { e.preventDefault(); startDefense(); });
        attackBtn.addEventListener('touchstart', (e) => { e.preventDefault(); tryAttack(); });
        defendBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startDefense(); });
        
        startOverlay.addEventListener('click', async () => {
            startOverlay.style.opacity = '0';
            setTimeout(() => startOverlay.remove(), 500);
            await startCamera();
            gameLoop();
        });
        
        initJoystick();
        updateHealthBars();
        
        // 預設敵人位置
        enemyGroup.position.set(2, 0, 2);
        playerGroup.position.set(0, 0, 0);
    </script>
</body>
</html>
