<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的刀盾 - 砍真人！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: monospace;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* UI */
        .ui-panel {
            position: absolute;
            z-index: 3;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-weight: bold;
            border: 2px solid #ff4444;
            font-family: monospace;
        }

        .health-bar-container {
            top: 20px;
            left: 20px;
            width: 200px;
        }

        .health-label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .health-bg {
            background: #330000;
            border-radius: 20px;
            height: 20px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .enemy-health {
            top: 20px;
            right: 20px;
            width: 200px;
            text-align: right;
        }

        .enemy-health .health-fill {
            background: linear-gradient(90deg, #ff8844, #ff4400);
        }

        .status-panel {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
            white-space: nowrap;
            background: rgba(0,0,0,0.9);
            border-color: #ffd966;
        }

        /* 攻击按钮 */
        .attack-btn-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
        }

        .attack-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 4px solid #ff8888;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            cursor: pointer;
            touch-action: manipulation;
        }

        .attack-btn:active {
            transform: scale(0.95);
            background: rgba(255,0,0,0.9);
        }

        /* 防御按钮 */
        .defend-btn-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
        }

        .defend-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(0,100,200,0.7);
            backdrop-filter: blur(10px);
            border: 4px solid #88aaff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        .defend-btn:active {
            transform: scale(0.95);
            background: rgba(0,100,200,0.9);
        }

        .defend-warning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            font-size: 36px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 20px red;
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 60px;
            white-space: nowrap;
            border: 4px solid red;
            animation: pulse 0.3s infinite;
            display: none;
            font-family: monospace;
            text-align: center;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.05); }
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 48px;
            color: white;
            gap: 30px;
        }

        .game-over button {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e, #000);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            cursor: pointer;
        }

        .start-title {
            font-size: 56px;
            color: #ffd966;
            text-shadow: 0 0 20px rgba(255,217,102,0.5);
        }

        .start-sub {
            font-size: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid #ffd966;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 3;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <video id="videoCanvas" autoplay playsinline muted></video>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel health-bar-container">
        <div class="health-label">🩸 你的血量</div>
        <div class="health-bg"><div class="health-fill" id="playerHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel enemy-health">
        <div class="health-label">🎯 敵方血量（真人）</div>
        <div class="health-bg"><div class="health-fill" id="enemyHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="status-panel ui-panel" id="statusText">
        🗡️ 點畫面攻擊真人 🛡️
    </div>

    <div class="attack-btn-container">
        <div class="attack-btn" id="attackBtn">⚔️</div>
    </div>

    <div class="defend-btn-container">
        <div class="defend-btn" id="defendBtn">🛡️</div>
    </div>

    <div id="defendWarning" class="defend-warning">
        ⚠️ 轉頭了！快按防禦！ ⚠️
    </div>

    <div class="instruction">
        📷 鏡頭裡的人 = 敵人 | 砍他！ | 轉頭就要按🛡️防禦
    </div>
</div>

<div class="start-overlay" id="startOverlay">
    <div class="start-title">🗡️ 我的刀盾 🛡️</div>
    <div class="start-sub">⚔️ 點擊開啟鏡頭，砍真人！ ⚔️</div>
    <div style="color:#aaa; margin-top:20px; font-size:14px;">📷 需要允許相機權限</div>
</div>

<script>
    const video = document.getElementById('videoCanvas');
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    const playerHealthFill = document.getElementById('playerHealthFill');
    const enemyHealthFill = document.getElementById('enemyHealthFill');
    const statusDiv = document.getElementById('statusText');
    const defendWarning = document.getElementById('defendWarning');
    const attackBtn = document.getElementById('attackBtn');
    const defendBtn = document.getElementById('defendBtn');
    const startOverlay = document.getElementById('startOverlay');

    // 遊戲狀態
    let playerHealth = 100;
    let enemyHealth = 100;
    let gameRunning = true;
    let cameraReady = false;
    
    // 防禦狀態
    let isDefending = false;
    let forcedDefense = false;
    let faceDetected = false;
    let defendTimer = null;
    
    // 攻擊冷卻
    let canAttack = true;
    let attackCooldown = 0;
    
    // 敵人AI攻擊計時
    let enemyAttackTimer = 0;
    
    let stream = null;
    let gameLoopId = null;

    // 更新血條
    function updateHealthBars() {
        playerHealthFill.style.width = `${Math.max(0, playerHealth)}%`;
        enemyHealthFill.style.width = `${Math.max(0, enemyHealth)}%`;
    }

    // 閃光特效
    function flashEffect(color) {
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.4;
        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
        ctx.globalAlpha = 1;
        setTimeout(() => {
            if (gameCanvas && ctx) ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
        }, 100);
    }

    // 遊戲結束
    function gameOver() {
        if (!gameRunning) return;
        gameRunning = false;
        
        const div = document.createElement('div');
        div.className = 'game-over';
        div.innerHTML = `
            <div>💀 你輸了 💀</div>
            <div style="font-size:20px;">${playerHealth <= 0 ? '血量歸零' : '轉頭沒防禦'}</div>
            <button onclick="location.reload()">🔄 重來一次</button>
        `;
        document.body.appendChild(div);
    }

    // 攻擊！砍真人！
    function tryAttack() {
        if (!gameRunning) {
            statusDiv.innerText = "遊戲已結束，請重整";
            return;
        }
        if (!cameraReady) {
            statusDiv.innerText = "❌ 鏡頭還沒開啟！";
            return;
        }
        if (!canAttack) {
            statusDiv.innerText = "⏳ 冷卻中...";
            return;
        }
        if (!faceDetected) {
            statusDiv.innerText = "❌ 沒看到人！敵人要在鏡頭前！";
            return;
        }
        
        // 攻擊成功！
        canAttack = false;
        attackCooldown = 20;  // 冷卻時間
        
        const damage = 15;
        enemyHealth = Math.max(0, enemyHealth - damage);
        updateHealthBars();
        statusDiv.innerText = `⚔️ 砍中真人！ -${damage} ⚔️`;
        flashEffect('#ff0000');
        
        // 手機震動
        if (navigator.vibrate) navigator.vibrate(50);
        
        // 勝利判定
        if (enemyHealth <= 0) {
            gameRunning = false;
            const div = document.createElement('div');
            div.className = 'game-over';
            div.innerHTML = `
                <div>🏆 勝利！ 你砍倒了真人！ 🏆</div>
                <button onclick="location.reload()">🔄 再玩一次</button>
            `;
            document.body.appendChild(div);
        }
    }

    // 防禦
    function startDefense() {
        if (!gameRunning) return;
        if (defendTimer) clearTimeout(defendTimer);
        isDefending = true;
        statusDiv.innerText = "🛡️ 防禦中！ 🛡️";
        if (navigator.vibrate) navigator.vibrate(30);
        
        defendTimer = setTimeout(() => {
            isDefending = false;
            if (gameRunning && !forcedDefense) {
                statusDiv.innerText = "🗡️ 點攻擊砍真人 🛡️";
            }
        }, 800);
    }

    // 玩家受傷（敵人反擊）
    function damagePlayer(amount) {
        if (!gameRunning) return;
        
        if (isDefending) {
            statusDiv.innerText = "🛡️ 防禦成功！擋住了！";
            flashEffect('#4488ff');
            return;
        }
        
        playerHealth = Math.max(0, playerHealth - amount);
        updateHealthBars();
        flashEffect('#ffffff');
        statusDiv.innerText = `💔 被反擊！ -${amount} 💔`;
        if (navigator.vibrate) navigator.vibrate(100);
        
        if (playerHealth <= 0) {
            gameOver();
        }
    }

    // 膚色偵測（判斷鏡頭前有沒有人）
    function isSkinColor(r, g, b) {
        return (r > 70 && g > 35 && b > 20 && Math.abs(r - g) > 8 && r > g && r > b);
    }

    function analyzeFrame(imageData) {
        const data = imageData.data;
        const width = imageData.width;
        const height = imageData.height;
        let skinPixels = 0;
        let centerSkinPixels = 0;
        const centerXStart = width * 0.2;
        const centerXEnd = width * 0.8;
        
        for (let y = 0; y < height; y += 5) {
            for (let x = 0; x < width; x += 5) {
                const idx = (y * width + x) * 4;
                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];
                if (isSkinColor(r, g, b)) {
                    skinPixels++;
                    if (x >= centerXStart && x <= centerXEnd) centerSkinPixels++;
                }
            }
        }
        
        const totalPixels = (width * height) / 25;
        const skinRatio = skinPixels / totalPixels;
        const centerSkinRatio = centerSkinPixels / totalPixels;
        
        const humanDetected = skinRatio > 0.012;
        let isLookingAway = false;
        
        if (humanDetected) {
            if (centerSkinRatio < skinRatio * 0.4) {
                isLookingAway = true;
            }
        } else {
            isLookingAway = true;
        }
        
        return { humanDetected, isLookingAway };
    }

    // 敵人反擊計時器
    function updateEnemyCounterAttack() {
        if (!gameRunning) return;
        if (enemyAttackTimer <= 0) {
            // 只有鏡頭前有真人，敵人才會反擊
            if (faceDetected && cameraReady) {
                damagePlayer(10);
                enemyAttackTimer = 50;  // 約1秒反擊一次
            }
        } else {
            enemyAttackTimer--;
        }
    }

    // 繪圖：顯示準心 + 提示
    function drawOverlay() {
        if (!gameCanvas.width || !gameCanvas.height) return;
        
        const w = gameCanvas.width;
        const h = gameCanvas.height;
        
        // 準心
        ctx.beginPath();
        ctx.arc(w/2, h/2, 50, 0, Math.PI * 2);
        ctx.strokeStyle = faceDetected ? '#00ff00' : '#ff0000';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(w/2 - 70, h/2);
        ctx.lineTo(w/2 - 30, h/2);
        ctx.moveTo(w/2 + 30, h/2);
        ctx.lineTo(w/2 + 70, h/2);
        ctx.moveTo(w/2, h/2 - 70);
        ctx.lineTo(w/2, h/2 - 30);
        ctx.moveTo(w/2, h/2 + 30);
        ctx.lineTo(w/2, h/2 + 70);
        ctx.stroke();
        
        // 提示文字
        ctx.font = "bold 20px monospace";
        ctx.fillStyle = faceDetected ? "#00ff00" : "#ff0000";
        ctx.shadowBlur = 0;
        ctx.fillText(faceDetected ? "✓ 鎖定真人" : "✗ 無人可砍", w/2 - 60, h/2 - 60);
        
        if (faceDetected) {
            ctx.fillStyle = "#ffaa44";
            ctx.font = "24px monospace";
            ctx.fillText("⚔️ 砍這裡！", w/2 + 30, h/2 - 20);
        }
    }

    // 主遊戲循環
    function gameLoop() {
        if (!gameRunning) return;
        
        // 更新冷卻
        if (!canAttack) {
            attackCooldown--;
            if (attackCooldown <= 0) canAttack = true;
        }
        
        // 敵人反擊
        updateEnemyCounterAttack();
        
        // 處理鏡頭畫面
        if (cameraReady && video.readyState >= 2 && video.videoWidth > 0) {
            if (gameCanvas.width !== video.videoWidth || gameCanvas.height !== video.videoHeight) {
                gameCanvas.width = video.videoWidth;
                gameCanvas.height = video.videoHeight;
            }
            
            // 畫鏡頭
            ctx.drawImage(video, 0, 0, gameCanvas.width, gameCanvas.height);
            
            // 分析畫面
            const imageData = ctx.getImageData(0, 0, gameCanvas.width, gameCanvas.height);
            const { humanDetected, isLookingAway } = analyzeFrame(imageData);
            faceDetected = humanDetected;
            
            // 轉頭防禦機制
            if (isLookingAway) {
                if (!forcedDefense) {
                    forcedDefense = true;
                    defendWarning.style.display = 'block';
                    statusDiv.innerText = "⚠️ 轉頭了！快按防禦！ ⚠️";
                    
                    // 1秒內沒防禦就輸
                    setTimeout(() => {
                        if (forcedDefense && !isDefending && gameRunning) {
                            gameRunning = false;
                            const div = document.createElement('div');
                            div.className = 'game-over';
                            div.innerHTML = `
                                <div>💀 你輸了 💀</div>
                                <div style="font-size:20px;">轉頭沒有防禦</div>
                                <button onclick="location.reload()">🔄 重來</button>
                            `;
                            document.body.appendChild(div);
                        }
                    }, 1000);
                }
            } else {
                forcedDefense = false;
                defendWarning.style.display = 'none';
            }
            
            // 畫疊加層
            drawOverlay();
        } else if (cameraReady) {
            // 鏡頭還沒畫面
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            drawOverlay();
        }
        
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    // 開啟鏡頭
    async function startCamera() {
        try {
            statusDiv.innerText = "📷 請求鏡頭...";
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;
            await video.play();
            cameraReady = true;
            
            // 等待畫面尺寸
            await new Promise(resolve => {
                const check = setInterval(() => {
                    if (video.videoWidth > 0) {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
            });
            
            gameCanvas.width = video.videoWidth;
            gameCanvas.height = video.videoHeight;
            statusDiv.innerText = "✅ 鏡頭開啟！把真人放進準心，點攻擊！";
            
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "❌ 無法開啟鏡頭，請檢查權限";
            cameraReady = false;
        }
    }

    // 事件綁定
    attackBtn.addEventListener('click', (e) => {
        e.preventDefault();
        tryAttack();
    });
    
    // 點擊畫面也可以攻擊
    gameCanvas.addEventListener('click', (e) => {
        e.preventDefault();
        tryAttack();
    });
    
    defendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        startDefense();
    });
    
    defendBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startDefense();
    });
    
    attackBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        tryAttack();
    });
    
    // 開始遊戲
    startOverlay.addEventListener('click', async () => {
        startOverlay.style.opacity = '0';
        setTimeout(() => startOverlay.style.display = 'none', 500);
        await startCamera();
        gameLoop();
    });
    
    // 初始化
    updateHealthBars();
    gameCanvas.width = window.innerWidth;
    gameCanvas.height = window.innerHeight;
</script>
</body>
</html>
