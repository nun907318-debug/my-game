<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的刀盾 - 摇杆控制 + 体感砍杀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, monospace;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #videoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* UI 面板 */
        .ui-panel {
            position: absolute;
            z-index: 3;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 8px 15px;
            color: white;
            font-weight: bold;
            border: 2px solid #ffd966;
            font-family: monospace;
        }

        .health-bar-container {
            top: 15px;
            left: 15px;
            width: 160px;
        }

        .health-label {
            font-size: 11px;
            margin-bottom: 3px;
        }

        .health-bg {
            background: #330000;
            border-radius: 20px;
            height: 14px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .enemy-health {
            top: 15px;
            right: 15px;
            width: 160px;
            text-align: right;
        }

        .enemy-health .health-fill {
            background: linear-gradient(90deg, #ff8844, #ff4400);
        }

        .status-panel {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 12px;
            white-space: nowrap;
            padding: 6px 12px;
            background: rgba(0,0,0,0.85);
        }

        /* 虚拟摇杆 */
        .joystick-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 10;
            pointer-events: none;
        }

        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(30,30,50,0.6);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: auto;
        }

        .joystick-thumb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: rgba(255,215,0,0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            transition: 0.02s linear;
        }

        /* 攻击防御按钮 */
        .touch-controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .touch-btn {
            pointer-events: auto;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: 0.05s linear;
            touch-action: manipulation;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .attack-btn {
            border-color: #ff4444;
            color: #ff8888;
            background: rgba(80,0,0,0.8);
        }

        .defend-btn {
            border-color: #44aaff;
            color: #88ccff;
            background: rgba(0,40,80,0.8);
        }

        .touch-btn:active {
            transform: scale(0.92);
            filter: brightness(1.3);
        }

        .btn-label {
            font-size: 10px;
            margin-top: 3px;
            font-family: monospace;
        }

        .defend-warning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            font-size: 28px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 20px red;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 60px;
            white-space: nowrap;
            border: 3px solid red;
            animation: pulse 0.4s infinite;
            display: none;
            font-family: monospace;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 40px;
            color: white;
            gap: 25px;
            backdrop-filter: blur(8px);
        }

        .game-over button {
            padding: 14px 36px;
            font-size: 22px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .instruction {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 3;
            background: rgba(0,0,0,0.55);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <video id="videoCanvas" autoplay playsinline muted></video>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel health-bar-container">
        <div class="health-label">⚔️ 玩家</div>
        <div class="health-bg"><div class="health-fill" id="playerHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="ui-panel enemy-health">
        <div class="health-label">🛡️ 敵人</div>
        <div class="health-bg"><div class="health-fill" id="enemyHealthFill" style="width: 100%"></div></div>
    </div>

    <div class="status-panel ui-panel" id="statusText">
        🎮 搖桿移動 | 攻擊/防禦
    </div>

    <!-- 虚拟摇杆 -->
    <div class="joystick-container" id="joystickContainer">
        <div class="joystick-base" id="joystickBase"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>

    <!-- 攻击防御按钮 -->
    <div class="touch-controls">
        <div class="touch-btn attack-btn" id="attackBtn">
            ⚔️
            <span class="btn-label">攻擊</span>
        </div>
        <div class="touch-btn defend-btn" id="defendBtn">
            🛡️
            <span class="btn-label">長按防禦</span>
        </div>
    </div>

    <div id="defendWarning" class="defend-warning">
        ⚠️ 轉頭防禦！ ⚠️
    </div>

    <div class="instruction">
        📍 左下搖桿移動 | ⚔️攻擊 | 🛡️長按防禦
    </div>
</div>

<script>
    // ========== 元件 ==========
    const video = document.getElementById('videoCanvas');
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    const playerHealthFill = document.getElementById('playerHealthFill');
    const enemyHealthFill = document.getElementById('enemyHealthFill');
    const statusDiv = document.getElementById('statusText');
    const defendWarning = document.getElementById('defendWarning');
    const attackBtn = document.getElementById('attackBtn');
    const defendBtn = document.getElementById('defendBtn');

    // ========== 搖桿控制 ==========
    const joystickBase = document.getElementById('joystickBase');
    const joystickThumb = document.getElementById('joystickThumb');
    let joystickActive = false;
    let joystickVector = { x: 0, y: 0 };  // -1 到 1
    let joystickCenter = { x: 0, y: 0 };
    let joystickRadius = 60;

    // 玩家位置 (畫布上的座標，百分比 0-1)
    let playerX = 0.5;
    let playerY = 0.7;
    const PLAYER_SPEED = 0.008;

    // 敵人位置 (固定追蹤鏡頭中央或移動)
    let enemyX = 0.5;
    let enemyY = 0.5;

    // ========== 遊戲狀態 ==========
    let playerHealth = 100;
    let enemyHealth = 100;
    let gameRunning = true;
    
    let isDefending = false;
    let forcedDefense = false;
    let faceDetected = true;
    let defendTimer = null;
    
    let canAttack = true;
    let attackCooldown = 0;
    
    let stream = null;
    let enemyAttackTimer = 0;
    
    let longPressTimer = null;

    // ========== 搖桿邏輯 ==========
    function initJoystick() {
        const rect = joystickBase.getBoundingClientRect();
        joystickCenter.x = rect.left + rect.width / 2;
        joystickCenter.y = rect.top + rect.height / 2;
        joystickRadius = rect.width / 2 - 15;
    }

    function handleJoystickStart(e) {
        e.preventDefault();
        joystickActive = true;
        updateJoystickPosition(e);
    }

    function handleJoystickMove(e) {
        if (!joystickActive) return;
        e.preventDefault();
        updateJoystickPosition(e);
    }

    function updateJoystickPosition(e) {
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        let dx = clientX - joystickCenter.x;
        let dy = clientY - joystickCenter.y;
        let distance = Math.hypot(dx, dy);
        
        if (distance > joystickRadius) {
            dx = dx / distance * joystickRadius;
            dy = dy / distance * joystickRadius;
            distance = joystickRadius;
        }
        
        joystickVector.x = dx / joystickRadius;
        joystickVector.y = dy / joystickRadius;
        
        // 移動 thumb
        joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function handleJoystickEnd(e) {
        joystickActive = false;
        joystickVector = { x: 0, y: 0 };
        joystickThumb.style.transform = 'translate(-50%, -50%)';
    }

    // 更新玩家位置
    function updatePlayerPosition() {
        if (!gameRunning) return;
        playerX += joystickVector.x * PLAYER_SPEED;
        playerY += joystickVector.y * PLAYER_SPEED;
        // 邊界限制
        playerX = Math.min(0.85, Math.max(0.15, playerX));
        playerY = Math.min(0.85, Math.max(0.15, playerY));
    }

    // 敵人 AI 移動 (稍微追玩家)
    function updateEnemyPosition() {
        if (!gameRunning) return;
        // 敵人慢慢靠向玩家
        const dx = playerX - enemyX;
        const dy = playerY - enemyY;
        enemyX += dx * 0.02;
        enemyY += dy * 0.02;
        enemyX = Math.min(0.9, Math.max(0.1, enemyX));
        enemyY = Math.min(0.9, Math.max(0.1, enemyY));
    }

    // ========== 遊戲核心 ==========
    function updateHealthBars() {
        playerHealthFill.style.width = `${Math.max(0, playerHealth)}%`;
        enemyHealthFill.style.width = `${Math.max(0, enemyHealth)}%`;
    }

    function flashEffect(color, alpha = 0.35) {
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
        ctx.globalAlpha = 1;
        setTimeout(() => {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
        }, 80);
    }

    function showGameOver(isVictory) {
        if (!gameRunning) return;
        gameRunning = false;
        const div = document.createElement('div');
        div.className = 'game-over';
        div.innerHTML = `
            <div>${isVictory ? '🏆 勝利 🏆' : '💀 戰敗 💀'}</div>
            <button onclick="location.reload()">⚔️ 再戰 ⚔️</button>
        `;
        document.body.appendChild(div);
    }

    function tryAttack() {
        if (!gameRunning) return false;
        if (!canAttack) return false;
        if (!faceDetected) {
            statusDiv.innerText = "❌ 沒人可砍！";
            return false;
        }
        
        // 檢查距離：玩家和敵人的畫布距離
        const distance = Math.hypot(playerX - enemyX, playerY - enemyY);
        if (distance > 0.25) {
            statusDiv.innerText = "❌ 太遠了！靠近敵人！";
            return false;
        }
        
        canAttack = false;
        attackCooldown = 18;
        
        const damage = 14;
        enemyHealth = Math.max(0, enemyHealth - damage);
        updateHealthBars();
        statusDiv.innerText = `⚔️ 砍殺！ -${damage} ⚔️`;
        flashEffect('#ff3300', 0.5);
        
        if (navigator.vibrate) navigator.vibrate(50);
        
        if (enemyHealth <= 0) {
            gameRunning = false;
            showGameOver(true);
        }
        return true;
    }

    function startDefense() {
        if (!gameRunning) return;
        if (defendTimer) clearTimeout(defendTimer);
        isDefending = true;
        statusDiv.innerText = "🛡️ 舉盾防禦中！ 🛡️";
        if (navigator.vibrate) navigator.vibrate(30);
        
        defendTimer = setTimeout(() => {
            isDefending = false;
            if (!forcedDefense && gameRunning) {
                statusDiv.innerText = "🎮 搖桿移動 | 攻擊/防禦";
            }
        }, 800);
    }

    function damagePlayer(amount) {
        if (!gameRunning) return;
        if (isDefending) {
            statusDiv.innerText = "🛡️ 防禦成功！";
            flashEffect('#44aaff', 0.3);
            return;
        }
        playerHealth = Math.max(0, playerHealth - amount);
        updateHealthBars();
        flashEffect('#ffffff', 0.6);
        statusDiv.innerText = `💔 受傷 -${amount} 💔`;
        if (navigator.vibrate) navigator.vibrate(100);
        
        if (playerHealth <= 0) {
            gameRunning = false;
            showGameOver(false);
        }
    }

    function updateEnemyAttack() {
        if (!gameRunning) return;
        if (enemyHealth <= 0) return;
        if (enemyAttackTimer <= 0) {
            // 敵人攻擊距離判定
            const distance = Math.hypot(playerX - enemyX, playerY - enemyY);
            if (distance < 0.3) {
                damagePlayer(11);
            }
            enemyAttackTimer = 45;
        } else {
            enemyAttackTimer--;
        }
    }

    // 膚色偵測
    function isSkinColor(r, g, b) {
        return (r > 75 && g > 40 && b > 25 && Math.abs(r - g) > 8 && r > g && r > b);
    }

    function analyzeFrame(imageData) {
        const data = imageData.data;
        const width = imageData.width;
        const height = imageData.height;
        let skinPixels = 0;
        let centerSkinPixels = 0;
        const centerXStart = width * 0.2;
        const centerXEnd = width * 0.8;
        
        for (let y = 0; y < height; y += 6) {
            for (let x = 0; x < width; x += 6) {
                const idx = (y * width + x) * 4;
                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];
                if (isSkinColor(r, g, b)) {
                    skinPixels++;
                    if (x >= centerXStart && x <= centerXEnd) centerSkinPixels++;
                }
            }
        }
        const totalPixels = (width * height) / 36;
        const skinRatio = skinPixels / totalPixels;
        const centerSkinRatio = centerSkinPixels / totalPixels;
        
        const humanDetected = skinRatio > 0.01;
        let isLookingAway = false;
        if (humanDetected) {
            if (centerSkinRatio < skinRatio * 0.45) isLookingAway = true;
        } else {
            isLookingAway = true;
        }
        return { humanDetected, isLookingAway };
    }

    // ========== 繪圖 ==========
    function drawGame() {
        if (!gameCanvas.width || !gameCanvas.height) return;
        ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
        
        const w = gameCanvas.width;
        const h = gameCanvas.height;
        
        // 繪製玩家 (刀盾勇士)
        const px = playerX * w;
        const py = playerY * h;
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(px, py, 30, 0, Math.PI * 2);
        ctx.fillStyle = '#2a6f8fcc';
        ctx.fill();
        ctx.strokeStyle = '#ffdd99';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.font = '28px monospace';
        ctx.fillStyle = 'white';
        ctx.fillText('🗡️🛡️', px - 28, py - 15);
        
        // 繪製敵人
        const ex = enemyX * w;
        const ey = enemyY * h;
        ctx.beginPath();
        ctx.arc(ex, ey, 35, 0, Math.PI * 2);
        ctx.fillStyle = '#8f2a2acc';
        ctx.fill();
        ctx.strokeStyle = '#ff6666';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = 'white';
        ctx.font = '28px monospace';
        ctx.fillText('👹', ex - 18, ey - 15);
        
        // 顯示距離提示
        const distance = Math.hypot(playerX - enemyX, playerY - enemyY);
        if (distance > 0.22 && distance < 0.4) {
            ctx.fillStyle = '#ffaa44';
            ctx.font = '16px monospace';
            ctx.fillText('⚡ 再靠近一點', px + 20, py - 20);
        }
        
        // 繪製搖桿指示器 (小圖示)
        if (joystickVector.x !== 0 || joystickVector.y !== 0) {
            ctx.fillStyle = '#ffdd88';
            ctx.font = '14px monospace';
            ctx.fillText('← → ↑ ↓', 20, h - 50);
        }
        
        // 臉部偵測提示
        if (!faceDetected) {
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 20px monospace';
            ctx.fillText('⚠️ 無人可砍', w/2-70, 80);
        }
    }

    // 主循環
    let frameId = null;
    function gameLoop() {
        if (!gameRunning && document.querySelector('.game-over')) return;
        
        updatePlayerPosition();
        updateEnemyPosition();
        
        if (video.readyState >= 2 && video.videoWidth > 0) {
            if (gameCanvas.width !== video.videoWidth || gameCanvas.height !== video.videoHeight) {
                gameCanvas.width = video.videoWidth;
                gameCanvas.height = video.videoHeight;
                initJoystick();
            }
            ctx.drawImage(video, 0, 0, gameCanvas.width, gameCanvas.height);
            const imageData = ctx.getImageData(0, 0, gameCanvas.width, gameCanvas.height);
            const { humanDetected, isLookingAway } = analyzeFrame(imageData);
            
            faceDetected = humanDetected;
            
            if (isLookingAway) {
                if (!forcedDefense) {
                    forcedDefense = true;
                    defendWarning.style.display = 'block';
                    statusDiv.innerText = "⚠️ 轉頭！長按防禦！ ⚠️";
                    if (!isDefending) {
                        setTimeout(() => {
                            if (forcedDefense && !isDefending && gameRunning) {
                                gameRunning = false;
                                showGameOver(false);
                            }
                        }, 550);
                    }
                }
            } else {
                forcedDefense = false;
                defendWarning.style.display = 'none';
                if(!isDefending && gameRunning) statusDiv.innerText = "🎮 搖桿移動靠近敵人 | 攻擊";
            }
            
            if (!canAttack) {
                attackCooldown--;
                if (attackCooldown <= 0) canAttack = true;
            }
            
            updateEnemyAttack();
            drawGame();
        } else {
            drawGame();
        }
        
        frameId = requestAnimationFrame(gameLoop);
    }

    // 相機初始化
    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();
            statusDiv.innerText = "✅ 移動靠近敵人再攻擊！";
        } catch (err) {
            statusDiv.innerText = "❌ 請允許相機權限";
        }
    }

    // 手機事件
    function attachEvents() {
        attackBtn.addEventListener('click', (e) => {
            e.preventDefault();
            tryAttack();
        });
        
        defendBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            longPressTimer = setTimeout(() => startDefense(), 120);
        });
        defendBtn.addEventListener('touchend', () => {
            if (longPressTimer) clearTimeout(longPressTimer);
        });
        
        // 搖桿事件
        const base = document.getElementById('joystickBase');
        base.addEventListener('touchstart', handleJoystickStart);
        base.addEventListener('touchmove', handleJoystickMove);
        base.addEventListener('touchend', handleJoystickEnd);
        window.addEventListener('resize', initJoystick);
    }

    function start() {
        initCamera();
        attachEvents();
        updateHealthBars();
        gameLoop();
    }
    
    start();
</script>
</body>
</html>
